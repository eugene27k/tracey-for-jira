app:
  id: ari:cloud:ecosystem::app/e5f0446b-10c6-4283-a4af-55f608351962
  runtime:
    name: nodejs24.x
modules:
  jira:projectPage:
    - key: traceability-matrix-project-page
      title: Tracey
      icon: static/icon.svg
      resource: enhanced-matrix-ui
      resolver:
        function: resolver
  jira:issuePanel:
    - key: traceability-issue-panel
      title: Tracey
      icon: static/icon.svg
      resource: ui
      render: native
      resolver:
        function: resolver
  jira:adminPage:
    - key: traceability-admin-page
      title: Tracey Config
      icon: static/icon.svg
      resource: ui
      render: native
      resolver:
        function: resolver
      useAsConfig: true
  trigger:
    - key: traceability-installed
      function: onInstall
      events:
        - avi:forge:installed:app
  function:
    - key: resolver
      handler: index.handler
    - key: onInstall
      handler: index.onInstall
resources:
  - key: ui
    path: src/frontend/index.jsx
  - key: enhanced-matrix-ui
    path: static/enhanced-matrix-ui
permissions:
  scopes:
    - read:jira-work
    - write:jira-work
    - manage:jira-configuration
    - storage:app
